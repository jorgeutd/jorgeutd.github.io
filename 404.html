<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>try{document.documentElement.dataset.theme=localStorage.getItem('theme')||'light';}catch(e){document.documentElement.dataset.theme='light';}</script>
  <meta name="color-scheme" content="light dark" />
  <meta name="robots" content="noindex" />
  <title>Page not found — Jorge Grisman</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/assets/css/styles.css" />
  <style>
    .nf { min-height: 70vh; display: grid; place-content: center; text-align: center; gap: 0.5rem; }
    .nf__code { font-size: clamp(3rem, 12vw, 6rem); margin: 0; line-height: 1; }
    .nf__code .accent { -webkit-background-clip: text; background-clip: text; }
  </style>
</head>
<body>
  <main class="container nf">
    <p class="nf__code">4<span class="accent">0</span>4</p>
    <h1>Page not found</h1>
    <p style="color: var(--text-muted); max-width: 48ch; margin-inline: auto;">
      The page you were looking for doesn&rsquo;t exist or has moved.
    </p>
    <p><a class="btn btn--primary" href="/">Back to home</a></p>
  </main>
</body>
</html>
